# === Railway Production Configuration ===
server.port=${PORT:8080}

# Datasource Configuration using Railway Environment Variables
# If you created a MySQL service in Railway, it will provide MYSQL_URL.
#spring.datasource.url=${SPRING_DATASOURCE_URL:${MYSQL_URL:jdbc:mysql://root:MNQEZskoamlwWTGoxhuuJcGDiMnNjdjj@mysql.railway.internal:3306/railway}}
# Forzamos el prefijo jdbc: antes de cualquier variable de Railway
spring.datasource.url=jdbc:${MYSQL_URL:${SPRING_DATASOURCE_URL:mysql://root:MNQEZskoamlwWTGoxhuuJcGDiMnNjdjj@mysql.railway.internal:3306/railway}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:MNQEZskoamlwWTGoxhuuJcGDiMnNjdjj}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#OPTION 2
# Forzamos el prefijo jdbc: para que el Driver de MySQL no lo rechace
#spring.datasource.url=jdbc:${MYSQL_URL}
#spring.datasource.username=${MYSQLUSER}
#spring.datasource.password=${MYSQLPASSWORD}
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Dialect (Required for MySQL on Railway)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false